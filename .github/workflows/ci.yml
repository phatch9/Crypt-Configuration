name: CI — Test & Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. Python backend unit tests
  # ──────────────────────────────────────────────────────────────────────────
  test-backend:
    name: Backend Tests (pytest)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server-python

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: server-python/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest tests/ -v --tb=short

  # ──────────────────────────────────────────────────────────────────────────
  # 2. React / TypeScript frontend tests
  # ──────────────────────────────────────────────────────────────────────────
  test-frontend:
    name: Frontend Tests (vitest)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # ──────────────────────────────────────────────────────────────────────────
  # 3. Build Docker image — server
  # ──────────────────────────────────────────────────────────────────────────
  build-server-image:
    name: Build Server Docker Image
    runs-on: ubuntu-latest
    needs: [test-backend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build server image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./server-python
          file: ./server-python/Dockerfile
          push: false
          tags: drcrypt-server:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────────────
  # 4. Build Docker image — client
  # ──────────────────────────────────────────────────────────────────────────
  build-client-image:
    name: Build Client Docker Image
    runs-on: ubuntu-latest
    needs: [test-frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build client image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./client
          file: ./client/Dockerfile
          push: false
          tags: drcrypt-client:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
