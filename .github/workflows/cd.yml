name: CD — Deploy to Production

on:
  push:
    branches: [main]

# Ensure only one deploy runs at a time; cancel any in-progress run
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. Build and push Docker images to Docker Hub
  # ──────────────────────────────────────────────────────────────────────────
  push-images:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push server image
        uses: docker/build-push-action@v6
        with:
          context: ./server-python
          file: ./server-python/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/drcrypt-server:latest
            ${{ secrets.DOCKER_USERNAME }}/drcrypt-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push client image
        uses: docker/build-push-action@v6
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/drcrypt-client:latest
            ${{ secrets.DOCKER_USERNAME }}/drcrypt-client:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────────────
  # 2. SSH into server, pull latest images, and restart services
  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: [push-images]

    steps:
      - name: Checkout code (for docker-compose.yml)
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/drcrypt"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd ~/drcrypt

            # Export the Docker Hub username so docker-compose can resolve image names
            export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}

            # Pull the latest images
            docker compose pull

            # Restart services with zero-downtime approach
            docker compose up -d --remove-orphans

            # Clean up old images to free disk space
            docker image prune -f

            echo "✅ Deployment complete — $(date)"
